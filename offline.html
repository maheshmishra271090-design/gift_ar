<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ExpRE — Offline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 32px;
        }
        .icon {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 28px;
            font-size: 40px;
        }
        h1 { font-size: 1.6rem; margin-bottom: 12px; font-weight: 700; }
        p  { color: #888; font-size: 0.95rem; line-height: 1.6; max-width: 280px; margin-bottom: 36px; }
        button {
            padding: 14px 36px;
            background: #4185f4; color: #fff;
            border: none; border-radius: 30px;
            font-size: 1rem; font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(65,133,244,0.4);
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>ExpRE needs a connection to load the AR experience. Please check your network and try again.</p>
    <button onclick="location.reload()">Try Again</button>
</body>
</html>
