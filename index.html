<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>GiftAR</title>

    <!-- Firebase Analytics -->
    <script type="module">
        import { initializeApp }  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAnalytics, logEvent, setUserProperties } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdkDjVDG4lN-Uwt0l0kGYuh2x3z4pHmuc",
  authDomain: "webar-e8b09.firebaseapp.com",
  projectId: "webar-e8b09",
  storageBucket: "webar-e8b09.firebasestorage.app",
  messagingSenderId: "807208636455",
  appId: "1:807208636455:web:337d72e4c4b8c8f74f3e02",
  measurementId: "G-SG84SFPXSG"
        };

        const app       = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        // Expose logEvent globally so the main script can call it
        window._logEvent = (eventName, params) => {
            try { logEvent(analytics, eventName, params); } catch(e) { console.warn('[Firebase]', e); }
        };

        // ── 1. MR Launch (page load = invoke count) ──────────────────────────────
        // Covers: Total MR Launches, Entry Source Split via UTM params
        const urlParams  = new URLSearchParams(window.location.search);
        window._logEvent('ar_launch', {
            campaign_id:     urlParams.get('id')     || 'unknown',
            utm_source:      urlParams.get('utm_source')   || 'direct',
            utm_medium:      urlParams.get('utm_medium')   || 'none',
            utm_campaign:    urlParams.get('utm_campaign') || 'none',
        });

        // ── 2. Crash tracking via window.onerror + unhandledrejection ─────────────
        // Covers: Crash Count, Crash Point (message + file + line)
        window.addEventListener('error', (e) => {
            window._logEvent('ar_crash', {
                campaign_id:  urlParams.get('id') || 'unknown',
                crash_message: e.message?.substring(0, 100) || 'unknown',
                crash_file:    e.filename?.substring(0, 100) || 'unknown',
                crash_line:    e.lineno || 0,
                user_agent:    navigator.userAgent?.substring(0, 100) || 'unknown',
            });
        });
        window.addEventListener('unhandledrejection', (e) => {
            window._logEvent('ar_crash', {
                campaign_id:   urlParams.get('id') || 'unknown',
                crash_message: String(e.reason)?.substring(0, 100) || 'unhandled_promise',
                crash_file:    'promise',
                crash_line:    0,
                user_agent:    navigator.userAgent?.substring(0, 100) || 'unknown',
            });
        });
    </script>

    <!-- Preconnect / dns-prefetch for all external origins -->
    <link rel="preconnect" href="https://aframe.io" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="dns-prefetch" href="https://cdn.aframe.io">

    <!-- Welcome poster preload injected dynamically after campaign JSON loads -->
    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/maheshmishra271090-design/gift_ar@main/data/welcomeposter.jpg" fetchpriority="high">
    <link rel="preload" as="image" href="https://raw.githubusercontent.com/maheshmishra271090-design/gift_ar/main/data/welcome.jpg">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Segoe UI', sans-serif; 
            background-color: #000;
        }
        .a-enter-vr, .a-enter-ar { display: none !important; }

        #welcome-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; 
            background-image: url('https://cdn.jsdelivr.net/gh/maheshmishra271090-design/gift_ar@main/data/welcomeposter.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end;
        }

        #bottom-sheet {
            width: 100%; height: 50%; border-radius: 40px 40px 0 0; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
            transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        #sheet-content {
            flex: 1;
            background-image: url('https://raw.githubusercontent.com/maheshmishra271090-design/gift_ar/main/data/welcome.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center top;
            display: flex; flex-direction: column; justify-content: center;
        }

        #sheet-footer {
            background: #000; padding: 20px 30px; display: flex;
            justify-content: space-between; align-items: center; border-top: 2px solid #FFF;
        }

        .footer-text h2 { color: white; margin: 0; font-size: 1.2rem; }
        .footer-text p { color: #888; margin: 5px 0 0 0; font-size: 0.9rem; }

        #play-button {
            width: 110px; height: 50px; background: #4185f4; border: none;
            border-radius: 25px; cursor: pointer; display: none;
            justify-content: center; align-items: center; color: white; font-weight: bold;
            box-shadow: 0 4px 15px rgba(65, 133, 244, 0.4);
        }

        #loading-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 150;
            flex-direction: column; justify-content: center; align-items: center; gap: 16px;
        }
        #loading-overlay .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #4185f4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loading-overlay p { color: #fff; font-size: 0.95rem; margin: 0; }

        #scanner-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; pointer-events: none;
        }
        .scanner-frame { width: 75vw; height: 75vw; position: relative; display: flex; justify-content: center; align-items: center; }
        .scanner-img { width: 70%; opacity: 0.6; }
        .scanner-line { position: absolute; width: 100%; height: 4px; background: #a3ff00; top: 0; animation: scan 2s linear infinite; }
        
        #video-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; z-index: 40; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        #video-wrapper { position: relative; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 20px; }
        #video-container video { width: 100%; border: 3px solid #FFF; border-radius: 20px; display: block; }

        #close-sticky {
            position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; 
            background: #ff3b30; color: white; border-radius: 50%; border: 2px solid white;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }

        #buy-now-cta {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 70px; display: none; z-index: 60;
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        #error-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 200; flex-direction: column; 
            justify-content: center; align-items: center; color: white; text-align: center; padding: 20px;
        }

        #ar-scene-container,
        #ar-scene-container a-scene {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            z-index: 0;
        }
        #ar-scene-container canvas {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
        }
        #ar-scene-container video.mindar-video,
        #ar-scene-container video[autoplay] {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: cover !important;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes slideUp { to { transform: translateY(0); } }
        @keyframes fadeInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="welcome-page">
        <div id="bottom-sheet">
            <div id="sheet-content"></div>
            <div id="sheet-footer">
                <div class="footer-text">
                    <h2 id="campaign-title">Checking Campaign...</h2>
                    <p>Experiencing - Reality</p>
                </div>
                <button id="play-button">Play</button>
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-msg">Loading AR Experience…</p>
    </div>

    <div id="scanner-ui">
        <div class="scanner-frame">
            <img id="dynamic-scanner-img" src="" class="scanner-img">
            <div class="scanner-line"></div>
        </div>
        <div style="color:white; margin-top:20px; font-weight:bold; text-shadow: 0 2px 4px #000;">SCAN THE PRODUCT</div>
    </div>

    <div id="video-container">
        <div id="video-wrapper">
            <button id="close-sticky">×</button>
        </div>
    </div>

    <div id="error-screen">
        <div style="font-size: 50px;">⚠️</div>
        <h2 id="error-title">Campaign Not Found</h2>
        <p id="error-msg">The link might be expired or incorrect.</p>
        <button onclick="location.reload()" style="margin-top:20px; padding:10px 25px; border-radius:20px; border:none; background:#4185f4; color:white; font-weight:bold;">Try Again</button>
    </div>

    <a href="#" target="_blank" id="buy-now-cta" onclick="window._logEvent?.('ar_cta_click', { campaign_id: window._campaignId, campaign_name: window._campaignName });"></a>
    <div id="ar-scene-container"></div>


    <script>
        const API_URL = "https://jsonmap.com/api/mock/ar?rnd=" + Math.random() + "#?jnsdk";

        const playBtn           = document.querySelector('#play-button');
        const welcomePage       = document.querySelector('#welcome-page');
        const scannerUi         = document.querySelector('#scanner-ui');
        const dynamicScannerImg = document.querySelector('#dynamic-scanner-img');
        const videoContainer    = document.querySelector('#video-container');
        const videoWrapper      = document.querySelector('#video-wrapper');
        const buyNowBtn         = document.querySelector('#buy-now-cta');
        const campaignTitle     = document.querySelector('#campaign-title');
        const errorScreen       = document.querySelector('#error-screen');
        const loadingOverlay    = document.querySelector('#loading-overlay');
        const loadingMsg        = document.querySelector('#loading-msg');

        let campaignData    = null;
        let isStickyEnabled = true;
        let hasFoundOnce    = false;

        const campaignPromise = (async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId  = urlParams.get('id');
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error("API Failure");
            const data = await res.json();
            return targetId
                ? data.find(item => item.id === targetId)
                : data.find(item => item.is_active === true);
        })();

        function prefetchARScripts() {
            [
                'https://aframe.io/releases/1.6.0/aframe.min.js',
                'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js'
            ].forEach(src => {
                const link = document.createElement('link');
                link.rel = 'prefetch'; link.as = 'script'; link.href = src;
                document.head.appendChild(link);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const campaign = await campaignPromise;
                if (!campaign) { errorScreen.style.display = 'flex'; return; }

                campaignData = campaign;
                window._campaignId   = campaign.id;
                window._campaignName = campaign.campaignName;
                campaignTitle.innerText = 'GiftAR';
                dynamicScannerImg.src   = campaign.scannerImg;

                // Set CTA — use clickTrackerUrl from JSON if available, else fall back to CTAredirectUrl directly
                if (campaign.CTAimgUrl) {
                    buyNowBtn.style.backgroundImage = `url('${campaign.CTAimgUrl}')`;
                }
                if (campaign.clickTrackerUrl) {
                    buyNowBtn.href = campaign.clickTrackerUrl;
                } else if (campaign.CTAredirectUrl) {
                    buyNowBtn.href = campaign.CTAredirectUrl;
                }

                prefetchARScripts();

                setTimeout(() => {
                    playBtn.style.display   = 'flex';
                    playBtn.style.animation = 'fadeInRight 0.5s ease forwards';
                }, 150);

            } catch (err) {
                console.error("Setup Error:", err);
                errorScreen.style.display = 'flex';
            }
        });

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve; s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        let arScriptsLoaded = false;

        async function ensureARScripts() {
            if (arScriptsLoaded) return;
            loadingMsg.textContent = 'Loading AR libraries…';
            await loadScript('https://aframe.io/releases/1.6.0/aframe.min.js');
            await loadScript('https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js');
            arScriptsLoaded = true;
        }

        function buildARScene(campaign) {

            AFRAME.registerComponent('force-front-facing', {
                init()       { this._active = false; },
                activate()   { this._active = true; },
                deactivate() { this._active = false; },
                tick()       { if (this._active) this.el.object3D.quaternion.set(0, 0, 0, 1); }
            });

            document.querySelector('#ar-scene-container').innerHTML = `
                <a-scene
                    id="ar-scene"
                    embedded
                    mindar-image="autoStart: false; uiScanning: #none; filterMinCF: 0.001; filterBeta: 0.001; missTolerance: 10;"
                    device-orientation-permission-ui="enabled: false"
                    vr-mode-ui="enabled: false"
                    renderer="antialias: true; colorManagement: true;">
                    <a-assets timeout="10000">
                        <video id="myVideo" src="${campaign.videoUrl}" loop="true" crossorigin="anonymous" playsinline webkit-playsinline preload="none"></video>
                    </a-assets>
                    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
                    <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
                        <a-text
                            id="ar-text-ui"
                            value="${campaign.campaignName.toUpperCase()}"
                            align="center" color="#FFFFFF" negate="false"
                            scale="0.8 0.8 0.8" position="0 1.25 0.1"
                            font="https://cdn.aframe.io/fonts/DejaVu-sdf.fnt"
                            force-front-facing>
                        </a-text>
                        <a-video id="ar-video-renderer" src="#myVideo" position="0 0 0.1"></a-video>
                    </a-entity>
                </a-scene>`;

            const sceneEl         = document.querySelector('#ar-scene');
            const arVideoRenderer = document.querySelector('#ar-video-renderer');
            const arTextUI        = document.querySelector('#ar-text-ui');
            const video           = document.querySelector('#myVideo');
            const aAssets         = document.querySelector('a-assets');

            function applyPlaneSize(targetW, targetH) {
                const planeW = 1;
                const planeH = planeW * (targetH / targetW);
                arVideoRenderer.setAttribute('width',  planeW);
                arVideoRenderer.setAttribute('height', planeH);
            }

            function sizeFromTargetImage() {
                return new Promise(resolve => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.src = campaign.scannerImg || campaign.targetImageUrl || '';
                    img.onload  = () => resolve({ w: img.naturalWidth,  h: img.naturalHeight });
                    img.onerror = () => resolve(null);
                });
            }

            (async () => {
                if (campaign.targetImageWidth && campaign.targetImageHeight) {
                    applyPlaneSize(campaign.targetImageWidth, campaign.targetImageHeight);
                    return;
                }
                const dims = await sizeFromTargetImage();
                if (dims) {
                    applyPlaneSize(dims.w, dims.h);
                    return;
                }
                video.addEventListener('loadedmetadata', () => {
                    applyPlaneSize(video.videoWidth, video.videoHeight);
                }, { once: true });
            })();

            sceneEl.setAttribute('mindar-image', {
                imageTargetSrc: campaign.mindUrl,
                autoStart: false, uiScanning: '#none'
            });

            let arStarted = false;
            function startARTracking() {
                if (arStarted) return;
                arStarted = true;
                loadingOverlay.style.display = 'none';
                scannerUi.style.display      = 'flex';

                // ── 4. AR Ready — camera live, user can now scan ──────────────────
                window._logEvent?.('ar_ready', { campaign_id: campaign.id });

                const arSystem = sceneEl.systems['mindar-image-system'];
                if (arSystem) arSystem.start();
            }

            sceneEl.addEventListener('renderstart', startARTracking, { once: true });

            const readyPoll = setInterval(() => {
                if (sceneEl.hasLoaded || sceneEl.renderStarted) {
                    clearInterval(readyPoll);
                    startARTracking();
                }
            }, 200);

            setTimeout(() => {
                clearInterval(readyPoll);
                startARTracking();
            }, 3000);

            const targetEntity = document.querySelector('#target-entity');

            let impressionFired    = false;
            let videoMilestones   = new Set();
            const pageLoadTime    = Date.now();
            let   arReadyTime     = null;
            let   targetFoundTime = null;

            // Track when AR actually became ready (camera live)
            sceneEl.addEventListener('renderstart', () => { arReadyTime = Date.now(); }, { once: true });

            targetEntity.addEventListener('targetFound', () => {
                hasFoundOnce    = true;
                isStickyEnabled = true;
                targetFoundTime = Date.now();

                scannerUi.style.display      = 'none';
                videoContainer.style.display = 'none';
                buyNowBtn.style.display      = 'block';

                if (video.parentElement !== aAssets) aAssets.appendChild(video);

                arVideoRenderer.setAttribute('visible', 'true');
                arTextUI.setAttribute('visible', 'true');
                arTextUI.components['force-front-facing']?.activate();

                if (video.readyState === 0) video.load();

                // ── 5. Impression tracker + Firebase video_play (first time only) ─
                if (!impressionFired && campaign.impressionTrackerUrl) {
                    const fireImpression = () => {
                        impressionFired = true;

                        // Pixel impression tracker
                        const imp = new Image();
                        imp.src = campaign.impressionTrackerUrl.replace('[timestamp]', Date.now()) + '&rnd=' + Math.random();
                        console.log('[Tracker] Impression fired:', imp.src);
                        video.removeEventListener('playing', fireImpression);

                        // ── 6. Avg Time to Scan (AR ready → target found) ─────────
                        const timeToScan = arReadyTime ? (targetFoundTime - arReadyTime) : null;

                        // ── 7. Scan-to-Load Success Rate (page load → video plays) ─
                        const timeToLoad = Date.now() - pageLoadTime;

                        window._logEvent?.('ar_video_play', {
                            campaign_id:      campaign.id,
                            campaign_name:    campaign.campaignName,
                            time_to_scan_ms:  timeToScan,
                            time_to_load_ms:  timeToLoad,
                        });
                    };
                    video.addEventListener('playing', fireImpression);
                }

                // ── 8. Video completion milestones (0,10,25,50,75,100%) ───────────
                // Re-attach timeupdate each targetFound (video may have been moved in DOM)
                video.addEventListener('timeupdate', () => {
                    if (!video.duration) return;
                    const pct = (video.currentTime / video.duration) * 100;
                    for (const milestone of [0, 10, 25, 50, 75, 100]) {
                        if (pct >= milestone && !videoMilestones.has(milestone)) {
                            videoMilestones.add(milestone);
                            window._logEvent?.('ar_video_progress', {
                                campaign_id:   campaign.id,
                                campaign_name: campaign.campaignName,
                                percent:       milestone,
                            });
                        }
                    }
                });

                video.play();
            });

            targetEntity.addEventListener('targetLost', () => {
                arTextUI.components['force-front-facing']?.deactivate();

                if (hasFoundOnce && isStickyEnabled) {
                    arVideoRenderer.setAttribute('visible', 'false');
                    arTextUI.setAttribute('visible', 'false');
                    videoContainer.style.display = 'flex';
                    videoWrapper.appendChild(video);
                    video.play();
                } else {
                    video.pause();
                }
            });

            document.querySelector('#close-sticky').addEventListener('click', (e) => {
                e.stopPropagation();
                isStickyEnabled = false;
                videoContainer.style.display = 'none';
                scannerUi.style.display      = 'flex';
                video.pause();
                aAssets.appendChild(video);
            });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) video.pause();
            });
        }

        // ── Play button ───────────────────────────────────────────────────────────
        playBtn.addEventListener('click', async () => {
            if (!campaignData) return;

            // ── 3. AR Session Start (Play tapped) ────────────────────────────────
            window._logEvent?.('ar_session_start', {
                campaign_id:   campaignData.id,
                campaign_name: campaignData.campaignName,
            });

            loadingOverlay.style.display = 'flex';
            loadingMsg.textContent = 'Loading AR Experience…';

            try {
                await ensureARScripts();
                document.body.style.backgroundColor            = 'transparent';
                document.documentElement.style.backgroundColor = 'transparent';
                welcomePage.style.display = 'none';
                buildARScene(campaignData);
            } catch (err) {
                console.error('AR load error:', err);
                loadingOverlay.style.display = 'none';
                errorScreen.style.display    = 'flex';
            }
        });
    </script>
</body>
</html>
